name: Update Filter Lists

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - '.github/workflows/update-filters.yml'
      - 'package.json'

permissions:
  contents: write
  actions: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run filter aggregation
        run: |
          rm -rf output/
          mkdir -p output
          node src/cli.js all
          echo "filter-rules.json"  > output/.gitignore
          echo "filter-dnsmasq.conf" >> output/.gitignore

      - name: Generate README
        run: node src/generate-readme.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A output/ docs/ README.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-update filter lists [skip ci]"
            git push
          fi

      - name: Cleanup old workflow runs
        run: |
          gh run list --workflow "${{ github.workflow }}" --limit 50 --json databaseId,status --jq '.[] | select(.status != "in_progress") | .databaseId' | tail -n +4 | while read id; do
            echo "Deleting run #$id"
            gh run delete "$id" --repo "${{ github.repository }}"
          done
        env:
          GH_TOKEN: ${{ github.token }}
